<svg width="400" height="240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8DDD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4C4B0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#grad1)"/>
  <!-- Personas conversando -->
  <circle cx="120" cy="120" r="25" fill="#8B6F47" opacity="0.7"/>
  <circle cx="280" cy="120" r="25" fill="#A0845C" opacity="0.7"/>
  <!-- Mesa -->
  <rect x="170" y="140" width="60" height="80" rx="8" fill="#B8956F" opacity="0.6"/>
  <!-- Elementos decorativos -->
  <circle cx="200" cy="60" r="15" fill="white" opacity="0.3"/>
  <circle cx="220" cy="45" r="8" fill="white" opacity="0.2"/>
  <circle cx="180" cy="50" r="10" fill="white" opacity="0.25"/>
  <!-- Texto decorativo -->
  <text x="200" y="200" font-family="Montserrat, sans-serif" font-size="12" font-weight="500" text-anchor="middle" fill="#666" opacity="0.8">Conversación</text>
</svg>